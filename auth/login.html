<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – FBA Unchained</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛓️‍💥</text></svg>"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --gold: #f5a623;
        --gold-light: #ffd280;
        --dark: #0a0a0a;
        --dark2: #111111;
        --dark3: #1a1a1a;
        --text: #e8e2d6;
        --muted: #888880;
        --white: #faf8f4;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--dark);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-weight: 300;
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .bg {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 60% 60% at 50% 40%,
            rgba(245, 166, 35, 0.07) 0%,
            transparent 70%
          ),
          var(--dark);
        z-index: 0;
      }
      .grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(245, 166, 35, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(245, 166, 35, 0.03) 1px, transparent 1px);
        background-size: 60px 60px;
        z-index: 0;
      }

      .card {
        position: relative;
        z-index: 1;
        background: var(--dark3);
        border: 1px solid rgba(245, 166, 35, 0.2);
        padding: 48px 40px;
        width: 100%;
        max-width: 420px;
      }

      .logo {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.4rem;
        letter-spacing: 0.12em;
        color: var(--gold);
        margin-bottom: 32px;
        display: block;
        text-align: center;
        text-decoration: none;
      }

      .card-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2rem;
        letter-spacing: 0.04em;
        color: var(--white);
        margin-bottom: 6px;
      }
      .card-sub {
        font-size: 0.88rem;
        color: var(--muted);
        margin-bottom: 32px;
      }

      .field {
        margin-bottom: 20px;
      }
      .field label {
        display: block;
        font-family: "DM Mono", monospace;
        font-size: 0.7rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .field input {
        width: 100%;
        background: var(--dark2);
        border: 1px solid rgba(245, 166, 35, 0.2);
        padding: 14px 16px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.2s;
      }
      .field input:focus {
        border-color: var(--gold);
      }
      .field input::placeholder {
        color: var(--muted);
      }

      .btn {
        width: 100%;
        background: var(--gold);
        color: var(--dark);
        border: none;
        padding: 16px;
        font-family: "DM Sans", sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.15s;
        margin-top: 8px;
      }
      .btn:hover {
        background: var(--gold-light);
        transform: translateY(-1px);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .error {
        background: rgba(255, 77, 0, 0.1);
        border: 1px solid rgba(255, 77, 0, 0.3);
        padding: 12px 16px;
        font-size: 0.85rem;
        color: #ff6b3d;
        margin-bottom: 20px;
        display: none;
      }
      .error.show {
        display: block;
      }

      .forgot {
        display: block;
        text-align: center;
        margin-top: 20px;
        font-size: 0.8rem;
        color: var(--muted);
        text-decoration: none;
        transition: color 0.2s;
      }
      .forgot:hover {
        color: var(--gold);
      }

      .back {
        display: block;
        text-align: center;
        margin-top: 12px;
        font-size: 0.78rem;
        color: var(--muted);
        text-decoration: none;
        letter-spacing: 0.06em;
        transition: color 0.2s;
      }
      .back:hover {
        color: var(--gold);
      }

      .loading {
        display: none;
        text-align: center;
        padding: 20px;
        font-family: "DM Mono", monospace;
        font-size: 0.78rem;
        color: var(--gold);
        letter-spacing: 0.1em;
      }

      @media (max-width: 480px) {
        .card {
          padding: 32px 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <div class="grid"></div>

    <div class="card">
      <a href="../index.html" class="logo"
        ><span style="margin-right: 6px">⛓️‍💥</span>FBA Unchained</a
      >
      <h1 class="card-title">Student Login</h1>
      <p class="card-sub">Access your course content below.</p>

      <div class="error" id="error-msg"></div>
      <div class="loading" id="loading">Signing you in...</div>

      <div id="login-form">
        <div class="field">
          <label>Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="you@example.com"
            autocomplete="email"
          />
        </div>
        <div class="field">
          <label>Password</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>
        <button class="btn" id="login-btn" onclick="handleLogin()">
          Access My Course
        </button>
        <a href="#" class="forgot" onclick="handleForgot(event)"
          >Forgot your password?</a
        >
        <a href="../index.html" class="back">← Back to FBA Unchained</a>
      </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
        sendPasswordResetEmail,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      // ── PASTE YOUR FIREBASE CONFIG HERE ──
      const firebaseConfig = {
        apiKey: "AIzaSyB4L3QVE-E5DsWu0xZYPbKOKtIwDfsCSJ8",
        authDomain: "fbaunchained-a4c13.firebaseapp.com",
        projectId: "fbaunchained-a4c13",
        storageBucket: "fbaunchained-a4c13.firebasestorage.app",
        messagingSenderId: "1082924077473",
        appId: "1:1082924077473:web:9bf0230a3fb5f11d3b3be0",
        measurementId: "G-DM2P7NXK9X",
      };
      // ─────────────────────────────────────

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // Redirect if already logged in
      onAuthStateChanged(auth, (user) => {
        if (user) window.location.href = "../course/index.html";
      });

      function showError(msg) {
        const el = document.getElementById("error-msg");
        el.textContent = msg;
        el.classList.add("show");
      }

      function hideError() {
        document.getElementById("error-msg").classList.remove("show");
      }

      window.handleLogin = async function () {
        hideError();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("login-btn");

        if (!email || !password) {
          showError("Please enter your email and password.");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Signing in...";

        try {
          await signInWithEmailAndPassword(auth, email, password);
          window.location.href = "../course/index.html";
        } catch (err) {
          btn.disabled = false;
          btn.textContent = "Access My Course";
          switch (err.code) {
            case "auth/user-not-found":
            case "auth/wrong-password":
            case "auth/invalid-credential":
              showError("Incorrect email or password. Please try again.");
              break;
            case "auth/too-many-requests":
              showError(
                "Too many attempts. Please wait a moment and try again.",
              );
              break;
            default:
              showError("Something went wrong. Please try again.");
          }
        }
      };

      window.handleForgot = async function (e) {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        if (!email) {
          showError(
            "Enter your email address first, then click forgot password.",
          );
          return;
        }
        try {
          await sendPasswordResetEmail(auth, email);
          hideError();
          const el = document.getElementById("error-msg");
          el.style.background = "rgba(245,166,35,0.1)";
          el.style.borderColor = "rgba(245,166,35,0.3)";
          el.style.color = "var(--gold)";
          el.textContent = "Password reset email sent. Check your inbox.";
          el.classList.add("show");
        } catch {
          showError(
            "Could not send reset email. Check the address and try again.",
          );
        }
      };

      // Allow Enter key to submit
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") window.handleLogin();
      });
    </script>
  </body>
</html>
